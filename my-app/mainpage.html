<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-app</title>
    <style>
	
	body {
		background-color: #e7e8ee;
	}
	
	#root {
		width:300px;
		margin: auto;
		background-color: #eecac2;
	}
	
	.topnav {
		background-color: #bed9a9;
		overflow: hidden;
	}
	
	.topnav a {
		float: right;
		color: #f2f2f2;
		text_align: center;
		padding: 14px 16px;
		text-decoration: none;
		font-size: 17px;
	}
	
	.topnav a:hover {
		background-color: #ddd;
		color: black;
	}
	
	.topnav a.active {
		background-color: #04AA6D;
		color: white;
	}
	
	.topnav a.logo {
		float:left;
	}
	
	#teacher {
		
	}
	
	.local-nav {
		border: 2px solid #000;
		min-height: 200px;
		width: 30%;
		margin: 1%;
		float: left;
		text-align: center;
		padding-top: 20px;
		padding-bottom: 20px;
}
	
	.main-content {
		border: 2px solid #000;
		margin: 20px;
		height: 150px;
		text-align: center;
		padding-top: 50px;

	}
	
	</style>
  </head>
  <body>
    <div class="topnav">
		<a class="logo"> Logo goes here </a>
		<a class="active" href="#index">Index</a>
		<a href="#student/teacher"> Student/Teacher</a>
		<a href="#classes"> Classes</a>
		<a href="#contact"> Contact</a>
		<a href="#about"> About</a>
	</div>
    <div id="root">
      <div class="main-content"> Welcome Message - something goes here </div>
	  <div style = "text-align: center; padding: 10px; margin: auto; width: 150%;">
		<div class = "local-nav">
			<h3> Teacher Login </h3>
			<form onsubmit="TryLogin(event, 'teacher')">
				<div class="form-group">
					<label for="teacher-username">Username:</label>
					<input type="text" id="teacher-username" name="username" required>
				</div>
				<div class="form-group">
					<label for="teacher-password">Password:</label>
					<input type="password" id="teacher-password" name="password" required>
				</div>
				<div class="form-group">
					<button type="submit"> Login </button>
				</div>
			</form>
		</div>
		<div class = "local-nav">
			<h3> Student login </h3>
			<form onsubmit="TryLogin(event, 'student')">
				<div class="form-group">
					<label for="student-username">Username:</label>
					<input type="password" id="student-username" name = "username" required>
				</div>
				<div class="form-group">
					<label for="student-password">Password:</label>
					<input type="password" id="student-password" name="password" required>
				</div>
				<div class="form-group">
					<button type="submit">Login</button>
				</div>
			</form>
		</div>
	  </div>
    </div>
    <script type="module" src="/src/main.jsx">
  function TryLogin(event, userType) {
		event.preventDefault();
		var username = document.getElementById(userType + '-username').value;
		var password = document.getElementById(userType + '-password').value;
	
		if(userType === 'teacher' && username === 'teacher' && password === 'password'){
			alert('Teacher Login successful!');
			window.location.href = 'teacherPage.html';
		}
		else if(userType === 'student' && username === 'student' && password === 'password') {
			alert('Student Login Successful!');
			window.location.href = 'studentPage.html';
		}
		else {
			alert('Login failed');
		}
	
		}
      
    </script>
  </body>
</html>
